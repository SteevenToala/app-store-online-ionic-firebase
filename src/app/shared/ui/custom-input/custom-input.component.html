<ion-item class="custom-input" lines="none">
  @if (icon) {
    <ion-icon color="primary" slot="start" [name]="icon"></ion-icon>
  }
  <ion-input
    [type]="type"
    [autocomplete]="autocomplete"
    [label]="label"
    [formControl]="control"
    labelPlacement="floating"
  >
  </ion-input>
  @if (isPassword) {
  <ion-button
    (click)="showOrHidePassword()"
    slot="end"
    fill="clear"
    shape="round"
  >
    <ion-icon slot="icon-only" [name]="hide ? 'eye-outline':'oye-off-outline'"></ion-icon>
  </ion-button>
  }
</ion-item>
