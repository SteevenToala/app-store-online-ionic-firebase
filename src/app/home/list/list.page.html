<app-header title="Inicio"></app-header>
<ion-content>
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>
  <ion-card></ion-card>

  @if (!loading) {
    <ion-list>
      @for (item of products; track $index) {
        <ion-item-sliding class="product-item">
          <ion-item>
            <ion-avatar slot="start">
              <img [src]="item.image">
            </ion-avatar>
            <ion-label>
              <div class="name">{{ item.name }}</div>
              <div class="data">
                <strong>Precio:</strong>{{item.price}}<br>
                <strong>Unidades vendidas:</strong>{{item.soldUnits}}
              </div>
              <ion-chip color="primary" mode="ios" outline="true">
                <ion-label>Ganancia:{{item.price * item.soldUnits}} </ion-label>
              </ion-chip>
            </ion-label>
          </ion-item>
          <ion-item-options>
            <ion-item-option (click)="addUpdateProduct(item)">
              <ion-icon class="option-btn" name="create-outline"></ion-icon>
            </ion-item-option>
            <ion-item-option (click)="deleteProduct(item)" color="danger">
              <ion-icon class="option-btn" name="trash-outline"></ion-icon>
            </ion-item-option>            
          </ion-item-options>
        </ion-item-sliding>
      }
    </ion-list>
  }
  @if (!loading && !products.length) {
    <div class="empty">
      <ion-icon name="shield-outline"></ion-icon>
      <h3>No hay productos</h3>
    </div>
  }

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addUpdateProduct()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  
</ion-content>
